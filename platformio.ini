; PlatformIO Project Configuration File

[env:Box-esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
	adafruit/Adafruit GFX Library@^1.12.5
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
lib_extra_dirs =
	${sysenv.PLATFORMIO_CORE_DIR}/packages/framework-arduinoespressif32/libraries
lib_ignore =
	esp32_sd
build_src_filter =
	+<main.cpp>
	+<modules>
	-<*.ino>
build_flags =
	-DCORE_DEBUG_LEVEL=0
	-I include
monitor_speed = 115200
